#Spawn Feature Configuration
#
# Controls natural mob spawning limits and datapack-driven spawn presets.
# Per-entity-type limits are configured via JSON presets in:
#   - data/<namespace>/aptweaks/spawn_presets/*.json  (datapack)
#   - config/adaptive_performance_tweaks/spawn_presets/*.json  (server-local)
#
# Global limits below serve as fallback when no preset defines a value.
# Default values are tuned for ~4 players. Scale per-player and per-world limits
# proportionally for larger servers.
#Tue Jul 21 01:25:41 CEST 2026
enabled=auto
entityChunkCleanupEnabled=true
entityChunkCleanupIntervalTicks=2400
entityChunkCleanupPerTypeLimit=64
friendlyChunkSpawnRate=9
minOptimizationLoadLevel=auto
naturalSpawnLimitationEnabled=true
naturalSpawnNightMonsterBonus=0.15
naturalSpawnNightPassivePenalty=0.1
naturalSpawnPassRateHigh=0.65
naturalSpawnPassRateLow=0.85
naturalSpawnPassRateMedium=0.75
naturalSpawnPassRateNormal=0.8
naturalSpawnPassRateVeryHigh=0.55
naturalSpawnPassRateVeryLow=0.9
naturalSpawnPrioritizeByTimeOfDay=true
presetReloadOnDatapackReload=true
spawnAggressiveMode=false
spawnEggBypassLimitations=true
spawnLimitationEnabled=true
spawnLimitationMaxMobsPerChunk=-1
spawnLimitationMaxMobsPerPlayer=40
spawnLimitationMaxMobsPerServer=1024
spawnLimitationMaxMobsPerWorld=300
specialSpawnBonusMaxLoadLevel=medium
specialSpawnBonusPerChunk=4
specialSpawnBonusPerPlayer=0
specialSpawnBonusPerServer=32
specialSpawnBonusPerWorld=16
specialSpawnBonusTypes=chunk_generation,event,patrol,reinforcement,structure
specialSpawnTypeBonusEnabled=true
viewAreaEnabled=true
