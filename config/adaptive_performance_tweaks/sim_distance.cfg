#Simulation Distance Feature Configuration
#
# Dynamically adjusts simulation distance for all players based on server load.
# Values are chunk counts. Min: 2, Max: 32.
# Higher load level = lower distance to reduce server tick pressure.
# Optional movement throttling adds temporary reductions during login, teleport and
# heavy exploration independent of load.
# Note: movementThrottleLoginTicks and movementThrottleDistanceThresholdBlocks are also
# used by the GameRules feature for its random-tick warmup timing.
# movementThrottleRecoveryMinDelayTicks acts as a hard floor: recovery never starts
# earlier, even if movementThrottleRecoveryDelayTicks is set lower.
#Tue Jul 21 01:25:41 CEST 2026
enabled=auto
loginWarmupEnabled=true
minOptimizationLoadLevel=auto
movementThrottleDistanceThresholdBlocks=24
movementThrottleEnabled=true
movementThrottleLoginTicks=60
movementThrottleMaxReduction=2
movementThrottleMinReduction=1
movementThrottleRecoverOnlyWhenStable=true
movementThrottleRecoveryDelayTicks=140
movementThrottleRecoveryMinDelayTicks=200
movementThrottleRecoveryStepTicks=40
movementThrottleSampleTicks=20
movementThrottleWindowSamples=3
movementThrottleWindowSamplesMax=5
simDistanceHigh=4
simDistanceLow=10
simDistanceMax=12
simDistanceMedium=6
simDistanceMin=2
simDistanceNormal=8
simDistanceVeryHigh=2
simDistanceVeryLow=12
